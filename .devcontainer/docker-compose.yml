services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/typescript-node:24
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "3000:3000"
      - "8080:8080"
      - "5555:5555"
  
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent-developer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
  
  valkey:
    image: valkey/valkey:9
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

volumes:
  postgres-data:
  valkey-data:
